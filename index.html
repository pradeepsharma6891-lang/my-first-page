<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>मेरी पहली वेबसाइट</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f4f4f4;
            margin: 0;
            padding: 50px;
        }
        .card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.1);
            display: inline-block;
        }
        h1 { color: #333; }
        p { color: #666; }
        button {
            background-color: #007BFF;
            color: white;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
            border-radius: 5px;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>नमस्ते, मैं कोडिंग सीख रहा हूँ!</h1>
        <p>यह मेरी HTML से बनी पहली वेबसाइट है।</p>
        <button onclick="alert('नमस्ते दुनिया!')">यहाँ क्लिक करें</button>
    </div>

</body>
</html>
